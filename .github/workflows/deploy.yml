name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ec2-user/My_Portfolio

            git fetch origin
            git reset --hard origin/main

            # Backend
            cd backend
            npm install
            npm run build

            pm2 restart backend || pm2 start dist/index.js --name backend

            # Frontend
            cd ../frontend
            npm install
            npm run build
