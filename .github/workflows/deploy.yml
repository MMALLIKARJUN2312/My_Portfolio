name: Deploy to EC2

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Deploy via SSH
    uses: appleboy/ssh-action@v1.0.0
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ec2-user
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        cd /home/ec2-user/My_Portfolio

        git pull origin main

        cd backend
        npm install
        npm run build
        pm2 restart backend

        cd ../frontend
        npm install
        npm run build
```
